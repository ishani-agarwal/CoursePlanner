// ─── Application State ────────────────────────────────────────────────────────
const state = {
  primaryMajor: null,
  doubleMajor:  null,
  minor:        null,
  startYear:    2025,
  checked:      {},   // key → true/false
  plan:         null, // { primary, secondary, minor, plan[], requirements[] }
};

// ─── Plan Builder ─────────────────────────────────────────────────────────────
function buildMergedPlan() {
  const primary   = MAJORS[state.primaryMajor];
  const secondary = state.doubleMajor ? MAJORS[state.doubleMajor] : null;
  const minor     = state.minor       ? MINORS[state.minor]       : null;

  const plan = JSON.parse(JSON.stringify(primary.plan));

  if (secondary) {
    const existingCodes = new Set(plan.flatMap(q => q.courses.map(c => c.code)));
    const toAdd = [];
    secondary.plan.forEach(q => {
      q.courses.forEach(c => {
        if (!existingCodes.has(c.code) && c.type === 'req') {
          toAdd.push({ ...c, type: 'dbl', source: secondary.name });
          existingCodes.add(c.code);
        }
      });
    });
    toAdd.forEach((c, i) => {
      const idx = Math.min(3 + Math.floor(i / 2), plan.length - 1);
      plan[idx].courses.push(c);
    });
  }

  if (minor) {
    const existingCodes = new Set(plan.flatMap(q => q.courses.map(c => c.code)));
    minor.courses
      .filter(c => !existingCodes.has(c.code))
      .forEach((c, i) => {
        const idx = Math.min(2 + Math.floor(i / 2), plan.length - 1);
        plan[idx].courses.push(c);
      });
  }

  state.plan = { primary, secondary, minor, plan, requirements: primary.requirements };
}

// ─── Computed Helpers ─────────────────────────────────────────────────────────
function totalCourses() {
  return state.plan ? state.plan.plan.reduce((a, q) => a + q.courses.length, 0) : 0;
}

function doneCourses() {
  return Object.values(state.checked).filter(Boolean).length;
}

function earnedUnits() {
  if (!state.plan) return 0;
  return state.plan.plan.reduce((total, q) =>
    total + q.courses.reduce((s, c) => {
      const key = `${q.year}_${q.quarter}_${c.code}`;
      return s + (state.checked[key] ? c.units : 0);
    }, 0), 0);
}

function checkedCodes() {
  const codes = new Set();
  if (!state.plan) return codes;
  state.plan.plan.forEach(q =>
    q.courses.forEach(c => {
      if (state.checked[`${q.year}_${q.quarter}_${c.code}`]) codes.add(c.code);
    })
  );
  return codes;
}

// ─── URL Share / Load ─────────────────────────────────────────────────────────
function serializeToURL() {
  const payload = {
    p:  state.primaryMajor,
    d:  state.doubleMajor  || '',
    m:  state.minor        || '',
    y:  state.startYear,
    c:  Object.entries(state.checked)
          .filter(([, v]) => v)
          .map(([k]) => k)
          .join(','),
  };
  const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(payload))));
  const url = `${location.origin}${location.pathname}?plan=${encoded}`;
  return url;
}

function loadFromURL() {
  const params = new URLSearchParams(location.search);
  const raw = params.get('plan');
  if (!raw) return false;
  try {
    const payload = JSON.parse(decodeURIComponent(escape(atob(raw))));
    state.primaryMajor = payload.p || null;
    state.doubleMajor  = payload.d || null;
    state.minor        = payload.m || null;
    state.startYear    = payload.y || 2025;
    state.checked      = {};
    (payload.c || '').split(',').filter(Boolean).forEach(k => { state.checked[k] = true; });
    if (state.primaryMajor && MAJORS[state.primaryMajor]) {
      buildMergedPlan();
      return true;
    }
  } catch (e) { console.warn('Could not parse plan from URL', e); }
  return false;
}

  let label = `Build plan: ${MAJORS[state.primaryMajor].name}`;

}

function selectMajor1(key, el) {
  document.querySelectorAll('#major1-pills .pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
  state.primaryMajor = key;
  if (state.doubleMajor === key) state.doubleMajor = null;
  document.querySelectorAll('#major2-pills .pill').forEach(p => {
    p.classList.remove('disabled');
    if (p.dataset.key === key) p.classList.add('disabled');
    if (p.dataset.key === state.doubleMajor) p.classList.add('selected');
    else p.classList.remove('selected');
  });
  updateBuildBtn();
}
function selectMajor2(key, el) {
  if (el.classList.contains('disabled')) return;
  if (el.classList.contains('selected')) { el.classList.remove('selected'); state.doubleMajor = null; }
  else {
    document.querySelectorAll('#major2-pills .pill').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected'); state.doubleMajor = key;
  }
  updateBuildBtn();
}
function selectMinor(key, el) {
  if (el.classList.contains('selected')) { el.classList.remove('selected'); state.minor = null; }
  else {
    document.querySelectorAll('#minor-pills .pill').forEach(p => p.classList.remove('selected'));
    el.classList.add('selected'); state.minor = key;
  }
  updateBuildBtn();
}
function selectYear(y, el) {
  document.querySelectorAll('.setup-screen .setup-card:nth-child(4) .pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected'); state.startYear = y;
}
function updateBuildBtn() {
  const btn = document.getElementById('build-btn');
  if (!btn) return;
  btn.disabled = !state.primaryMajor;
  btn.textContent = state.primaryMajor ? buildBtnLabel() : 'Select a major to continue →';
}

        <span><span class="ctag t-elec">Elec</span> Elective</span>
        ${state.plan.secondary ? '<span><span class="ctag t-dbl">2nd</span> Double major</span>' : ''}
        ${state.plan.minor     ? '<span><span class="ctag t-minor">Min</span> Minor</span>'      : ''}
      </div>
    </div>`;
}

// ─── 4-Year Grid ──────────────────────────────────────────────────────────────
function renderGrid() {
  const quarters = ['Autumn', 'Winter', 'Spring'];
  let html = '<div class="grid">';
  [1, 2, 3, 4].forEach(y => {
    const yearUnits = state.plan.plan
      .filter(q => q.year === y)
      .flatMap(q => q.courses)
      .reduce((s, c) => s + c.units, 0);
    html += `
      <div class="year-col">
        <div class="year-header">
          <div>Year ${y}<div class="yu">${state.startYear + y - 1}–${String(state.startYear + y).slice(-2)}</div></div>
          <div class="yr"><div class="yr-units">${yearUnits}</div><div class="yu">units</div></div>
        </div>`;
    quarters.forEach(qt => {
      const q = state.plan.plan.find(q => q.year === y && q.quarter === qt);
      if (!q) return;
      const qUnits = q.courses.reduce((s, c) => s + c.units, 0);
      html += `<div class="qtr"><div class="qtr-label">${qt} · ${qUnits}u</div>`;
      q.courses.forEach(c => {
        const key  = `${y}_${qt}_${c.code}`;
        const done = !!state.checked[key];
        const tagClass = { req:'t-req', ge:'t-ge', elec:'t-elec', minor:'t-minor', dbl:'t-dbl' }[c.type] || 't-elec';
        const tagLabel = { req:'Req',  ge:'GE',   elec:'Elec',   minor:'Min',     dbl:'2nd'  }[c.type] || 'Elec';
        html += `
          <div class="slot${done?' done-course':''}" onclick="toggleCourse('${key}')">
            <div class="cb${done?' on':''}"></div>
            <div class="ci">
              <div class="cc">${c.code}</div>
              <div class="cn">${c.name}</div>
              <span class="ctag ${tagClass}">${tagLabel}</span>
            </div>
            <div class="cu">${c.units}u</div>
          </div>`;
      });
      html += `<button class="add-btn" onclick="openAddModal(${y},'${qt}')">+ add course</button>`;
      html += '</div>';
    });
    html += '</div>';
  });
  html += '</div>';
  document.getElementById('view-grid').innerHTML = html;
}

// ─── Requirements ─────────────────────────────────────────────────────────────
function renderReqs() {
  const codes = checkedCodes();

  function reqGroup(reqs, label, badgeClass, badgeLabel) {
    let html = `<div class="req-group">
      <div class="req-group-hdr"><h3>${label}</h3><span class="source-badge ${badgeClass}">${badgeLabel}</span></div>`;
    reqs.forEach(req => {
      const done     = req.courses.length
        ? Math.min(req.courses.filter(c => codes.has(c)).length, req.needed)
        : 0;
      const pct      = req.needed ? Math.round(done / req.needed * 100) : 0;
      const complete = done >= req.needed;
      const dotCls   = complete ? 'd-done' : done > 0 ? 'd-part' : 'd-todo';
      const fillCol  = complete ? '#4caf50' : done > 0 ? '#ff9800' : '#ddd';
      html += `
        <div class="req-row">
          <div class="dot ${dotCls}"></div>
          <div class="rname">${req.name}</div>
          <div class="rbar"><div class="prog-wrap"><div class="prog-fill" style="width:${complete?100:pct}%;background:${fillCol}"></div></div></div>
          <div class="rcount${complete?' done':''}">${complete ? '✓ Done' : req.courses.length ? `${done}/${req.needed}` : `${req.needed} needed`}</div>
        </div>`;
    });
    html += '</div>';
    return html;
  }

  const WAYS = ['AQR','SI','CE','ER','AII','SMA','ED','GER'];
  let html = reqGroup(state.plan.primary.requirements,   `${state.plan.primary.name} Requirements`, 'sb-major', `${state.plan.primary.degree} Major`);
  if (state.plan.secondary) html += reqGroup(state.plan.secondary.requirements, `${state.plan.secondary.name} Requirements`, 'sb-dbl', '2nd Major');
  if (state.plan.minor)     html += reqGroup(state.plan.minor.requirements,     `${state.plan.minor.name} Requirements`,     'sb-minor', 'Minor');
  html += `<div class="req-group">
    <div class="req-group-hdr"><h3>Ways General Education</h3><span class="source-badge sb-ge">Stanford GE</span></div>
    ${WAYS.map(w => {
      const done = codes.has(`WAYS: ${w}`) ? 1 : 0;
      return `<div class="req-row">
        <div class="dot ${done?'d-done':'d-todo'}"></div>
        <div class="rname">Ways: ${w}</div>
        <div class="rbar"></div>
        <div class="rcount${done?' done':''}">${done ? '✓ Done' : 'Needed'}</div>
      </div>`;
    }).join('')}
  </div>`;
  document.getElementById('view-reqs').innerHTML = html;
}

// ─── Sidebar Stats ────────────────────────────────────────────────────────────
function updateSidebarStats() {
  const total = totalCourses(), done = doneCourses();
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('sidebar-stats').innerHTML = `
    <div class="s-label">Overall progress</div>
    <div class="s-val">${pct}%</div>
    <div class="s-sub">${done} of ${total} courses done</div>
    <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>`;
}

// ─── Tab Switch ───────────────────────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-' + tab).classList.add('active');
}

// ─── Add Course Modal ────────────────────────────────────────────────────────
function openAddModal(year, quarter) {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h3>Add course — Year ${year}, ${quarter}</h3>
        <div class="mfield"><label>Course code</label><input id="nc" placeholder="e.g. CS 224N" /></div>
        <div class="mfield"><label>Course name</label><input id="nn" placeholder="e.g. NLP with Deep Learning" /></div>
        <div class="mfield"><label>Units</label><input id="nu" placeholder="4" style="max-width:80px;" /></div>
        <div class="mfield"><label>Category</label>
          <select id="nt">
            <option value="req">Major requirement</option>
            <option value="ge">GE / Ways</option>
            <option value="minor">Minor</option>
            <option value="elec" selected>Elective</option>
          </select>
        </div>
        <div class="mactions">
          <button class="btn-sec" onclick="closeModal()">Cancel</button>
          <button class="btn-pri" onclick="addCourse(${year},'${quarter}')">Add</button>
        </div>
      </div>
    </div>`;
  document.getElementById('nc').focus();
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function addCourse(year, quarter) {
  const code = document.getElementById('nc').value.trim();
  if (!code) { alert('Enter a course code.'); return; }
  const q = state.plan.plan.find(q => q.year === year && q.quarter === quarter);
  if (q) q.courses.push({
    code,
    name:  document.getElementById('nn').value.trim() || code,
    units: parseInt(document.getElementById('nu').value) || 4,
    type:  document.getElementById('nt').value,
  });
  closeModal();
  renderAll();
}
// ─── PDF Export ───────────────────────────────────────────────────────────────
function exportPDF() {
  if (!state.plan) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'pt', format: 'a4' });

  const RED     = [140, 21, 21];
  const WHITE   = [255, 255, 255];
  const LIGHT   = [250, 249, 247];
  const BORDER  = [232, 228, 223];
  const DARK    = [26, 26, 26];
  const GRAY    = [120, 120, 120];

  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();

  // ── Header bar ──
  doc.setFillColor(...RED);
  doc.rect(0, 0, PW, 48, 'F');
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(18);
  doc.text('Stanford 4-Year Planner', 24, 30);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  let headerRight = `${state.plan.primary.name} (${state.plan.primary.degree})`;
  if (state.plan.secondary) headerRight += `  +  ${state.plan.secondary.name}`;
  if (state.plan.minor)     headerRight += `  ·  ${state.plan.minor.name} minor`;
  doc.text(headerRight, PW - 24, 30, { align: 'right' });
  doc.setFontSize(9);
  doc.text(`Generated ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}`, PW - 24, 42, { align: 'right' });

  // ── Summary bar ──
  const total = totalCourses(), done = doneCourses(), units = earnedUnits();
  const pct   = total ? Math.round(done / total * 100) : 0;
  doc.setFillColor(...LIGHT);
  doc.rect(0, 48, PW, 30, 'F');
  doc.setTextColor(...DARK);
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(10);
  doc.text(`Courses completed: ${done} / ${total}`, 24, 68);
  doc.text(`Units earned: ${units} / ${state.plan.primary.totalUnits}`, 200, 68);
  doc.text(`Progress: ${pct}%`, 380, 68);

  // ── 4-Year Grid ──
  const quarters  = ['Autumn', 'Winter', 'Spring'];
  const colW      = (PW - 48) / 4;
  const startY    = 92;
  let   maxBottom = startY;

  [1, 2, 3, 4].forEach((yr, yi) => {
    const x = 24 + yi * colW;
    // Year header
    doc.setFillColor(...RED);
    doc.roundedRect(x, startY, colW - 8, 26, 3, 3, 'F');
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(11);
    doc.text(`Year ${yr}`, x + 8, startY + 17);
    const yearLabel = `${state.startYear + yr - 1}–${String(state.startYear + yr).slice(-2)}`;
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.text(yearLabel, x + colW - 14, startY + 17, { align: 'right' });

    let curY = startY + 34;
    quarters.forEach(qt => {
      const q = state.plan.plan.find(q => q.year === yr && q.quarter === qt);
      if (!q) return;

      // Quarter label
      doc.setTextColor(...GRAY);
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(7.5);
      doc.text(qt.toUpperCase(), x + 6, curY + 8);
      curY += 14;

      q.courses.forEach(c => {
        const key    = `${yr}_${qt}_${c.code}`;
        const isDone = !!state.checked[key];
        const bgColor = isDone
          ? [240, 248, 240]
          : c.type === 'ge'    ? [232, 240, 252]
          : c.type === 'minor' ? [245, 232, 252]
          : c.type === 'dbl'   ? [255, 243, 224]
          : c.type === 'elec'  ? [234, 252, 232]
          : [255, 255, 255];

        doc.setFillColor(...bgColor);
        doc.setDrawColor(...BORDER);
        doc.roundedRect(x + 4, curY, colW - 14, 20, 2, 2, 'FD');

        // Checkbox
        if (isDone) {
          doc.setFillColor(...RED);
          doc.roundedRect(x + 8, curY + 5, 10, 10, 1.5, 1.5, 'F');
          doc.setTextColor(...WHITE);
          doc.setFont('helvetica', 'bold');
          doc.setFontSize(8);
          doc.text('✓', x + 10.5, curY + 13);
        } else {
          doc.setDrawColor(...RED);
          doc.setLineWidth(0.8);
          doc.roundedRect(x + 8, curY + 5, 10, 10, 1.5, 1.5, 'S');
        }

        // Course code + name
        doc.setTextColor(isDone ? 160 : ...DARK);
        doc.setFont('helvetica', isDone ? 'normal' : 'bold');
        doc.setFontSize(8);
        const codeText = c.code.length > 14 ? c.code.slice(0, 13) + '…' : c.code;
        doc.text(codeText, x + 22, curY + 10);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(7);
        doc.setTextColor(...GRAY);
        const nameText = c.name.length > 22 ? c.name.slice(0, 21) + '…' : c.name;
        doc.text(nameText, x + 22, curY + 17);
        // Units
        doc.text(`${c.units}u`, x + colW - 16, curY + 10, { align: 'right' });

        curY += 24;
      });
      curY += 4; // gap between quarters
    });
    maxBottom = Math.max(maxBottom, curY);
  });

  // ── Requirements page ──
  doc.addPage();
  doc.setFillColor(...RED);
  doc.rect(0, 0, PW, 36, 'F');
  doc.setTextColor(...WHITE);
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(15);
  doc.text('Requirement Checklist', 24, 24);

  const codes    = checkedCodes();
  let   ry       = 52;
  const colWidth = (PW - 48) / 2;

  function drawReqGroup(reqs, label, x, startRY) {
    doc.setFillColor(...RED);
    doc.roundedRect(x, startRY, colWidth - 12, 22, 3, 3, 'F');
    doc.setTextColor(...WHITE);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(10);
    doc.text(label, x + 8, startRY + 15);
    let ry2 = startRY + 30;
    reqs.forEach(req => {
      const done     = req.courses.length
        ? Math.min(req.courses.filter(c => codes.has(c)).length, req.needed)
        : 0;
      const complete = done >= req.needed;
      doc.setFillColor(complete ? 240 : 250, complete ? 248 : 249, complete ? 240 : 247);
      doc.setDrawColor(...BORDER);
      doc.roundedRect(x, ry2, colWidth - 12, 18, 2, 2, 'FD');
      // dot
      doc.setFillColor(complete ? 76 : done > 0 ? 255 : 200, complete ? 175 : done > 0 ? 152 : 200, complete ? 80 : done > 0 ? 0 : 200);
      doc.circle(x + 10, ry2 + 9, 3.5, 'F');
      doc.setTextColor(...DARK);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(8.5);
      const nameStr = req.name.length > 45 ? req.name.slice(0, 44) + '…' : req.name;
      doc.text(nameStr, x + 18, ry2 + 12);
      const statusStr = complete ? '✓ Done' : req.courses.length ? `${done}/${req.needed}` : `${req.needed} needed`;
      doc.setTextColor(complete ? 46 : ...GRAY, complete ? 125 : undefined, complete ? 30 : undefined);
      doc.setFont('helvetica', complete ? 'bold' : 'normal');
      doc.text(statusStr, x + colWidth - 16, ry2 + 12, { align: 'right' });
      ry2 += 22;
    });
    return ry2 + 8;
  }

  // Left column: primary + minor
  let leftBottom = drawReqGroup(state.plan.primary.requirements, `${state.plan.primary.name} (${state.plan.primary.degree})`, 24, ry);
  if (state.plan.minor) leftBottom = drawReqGroup(state.plan.minor.requirements, `${state.plan.minor.name} Minor`, 24, leftBottom + 4);

  // Right column: double major + Ways GE
  let rightBottom = ry;
  if (state.plan.secondary) rightBottom = drawReqGroup(state.plan.secondary.requirements, `${state.plan.secondary.name} (Double Major)`, 24 + colWidth, ry);
  const WAYS = ['AQR','SI','CE','ER','AII','SMA','ED','GER'];
  rightBottom = drawReqGroup(
    WAYS.map(w => ({ id: w, name: `Ways: ${w}`, courses: [`WAYS: ${w}`], needed: 1 })),
    'Ways General Education', 24 + colWidth, rightBottom + (rightBottom > ry ? 4 : 0)
  );

  // ── Footer ──
  [doc.internal.getNumberOfPages()].forEach(() => {});
  for (let p = 1; p <= doc.internal.getNumberOfPages(); p++) {
    doc.setPage(p);
    doc.setFillColor(...LIGHT);
    doc.rect(0, PH - 22, PW, 22, 'F');
    doc.setTextColor(...GRAY);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(8);
    doc.text('Stanford 4-Year Planner  ·  stanford-planner.vercel.app', 24, PH - 8);
    doc.text(`Page ${p}`, PW - 24, PH - 8, { align: 'right' });
  }

  const name = `${state.plan.primary.name.replace(/\s+/g, '-')}-4yr-plan.pdf`;
  doc.save(name);
}

// ─── Share Link ───────────────────────────────────────────────────────────────
function copyShareLink() {
  const url = serializeToURL();
  navigator.clipboard.writeText(url).then(() => {
    const toast = document.getElementById('share-toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }).catch(() => {
    prompt('Copy this link to share your plan:', url);
  });
}
// ─── Entry Point ──────────────────────────────────────────────────────────────
function onBuild() {
  if (!state.primaryMajor) return;
  buildMergedPlan();
  renderPlan();
}

function resetPlan() {
  state.primaryMajor = null;
  state.doubleMajor  = null;
  state.minor        = null;
  state.plan         = null;
  state.checked      = {};
  history.replaceState(null, '', location.pathname);
  renderSetup();
}

function toggleCourse(key) {
  state.checked[key] = !state.checked[key];
  renderAll();
}

// Load from URL if a ?plan= param exists, otherwise show setup
window.addEventListener('DOMContentLoaded', () => {
  if (!loadFromURL()) {
    renderSetup();
  } else {
    renderPlan();
  }
});
  </script>
