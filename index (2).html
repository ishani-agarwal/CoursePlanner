<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Stanford 4-Year Planner</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#faf9f7;color:#1a1a1a;font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#8C1515;color:#fff;display:flex;flex-direction:column;overflow-y:auto}
.main{flex:1;overflow-y:auto;padding:24px 28px}
.sidebar-logo{padding:18px 16px 12px}
.uni-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.6}
.app-name{font-size:17px;font-weight:700;margin-top:3px}
.sb-section{padding:10px 16px 3px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;opacity:.45;margin-top:6px}
.sb-btn{display:block;width:100%;text-align:left;padding:9px 16px;background:none;border:none;color:rgba(255,255,255,.8);font-size:13px;cursor:pointer}
.sb-btn:hover,.sb-btn.active{background:rgba(255,255,255,.15);color:#fff}
.sb-divider{margin:8px 16px;border:none;border-top:1px solid rgba(255,255,255,.15)}
#sb-plan-info{padding:2px 16px 8px;font-size:12px;color:rgba(255,255,255,.65);line-height:1.7}
.sb-stats{margin-top:auto;padding:14px 16px;border-top:1px solid rgba(255,255,255,.15)}
.sb-stats .sl{font-size:10px;opacity:.6;text-transform:uppercase;letter-spacing:.05em}
.sb-stats .sv{font-size:22px;font-weight:700;margin:2px 0}
.sb-stats .ss{font-size:11px;opacity:.6;margin-bottom:8px}
.mini-bar{height:4px;background:rgba(255,255,255,.2);border-radius:99px;overflow:hidden}
.mini-fill{height:100%;background:#fff;border-radius:99px;transition:width .3s}
.toast{margin:4px 16px 0;background:rgba(255,255,255,.2);border-radius:6px;padding:6px 10px;font-size:12px;text-align:center;display:none}

/* Setup */
.setup{max-width:640px;margin:0 auto;padding:40px 0 60px}
.setup h2{font-size:24px;font-weight:700;margin-bottom:6px}
.setup>p{color:#666;margin-bottom:24px;font-size:14px}
.card{background:#fff;border:1px solid #e8e4df;border-radius:12px;padding:18px;margin-bottom:14px}
.card h3{font-size:11px;font-weight:700;color:#8C1515;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{padding:7px 14px;border-radius:20px;border:1.5px solid #e0dbd5;background:#fff;font-size:13px;cursor:pointer;color:#444;user-select:none;transition:all .15s}
.pill:hover{border-color:#8C1515;color:#8C1515}
.pill.sel{background:#8C1515;border-color:#8C1515;color:#fff}
.pill.dis{opacity:.3;pointer-events:none}
.note{font-size:12px;color:#999;margin-top:8px}
.build-btn{background:#8C1515;color:#fff;border:none;padding:13px 28px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:18px;width:100%}
.build-btn:hover{background:#6e1010}
.build-btn:disabled{opacity:.4;cursor:not-allowed}

/* Stats */
.stats-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.stat{background:#fff;border:1px solid #e8e4df;border-radius:12px;padding:12px 16px;flex:1;min-width:100px}
.stat .sl{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.05em}
.stat .sv{font-size:24px;font-weight:700;margin:3px 0}
.stat .ss{font-size:11px;color:#999}
.pbar{height:6px;background:#ede8e2;border-radius:99px;overflow:hidden;margin-top:8px}
.pfill{height:100%;background:#8C1515;border-radius:99px;transition:width .3s}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid #e8e4df;margin-bottom:20px}
.tab{padding:9px 20px;font-size:13px;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none}
.tab.active{color:#8C1515;border-bottom-color:#8C1515;font-weight:600}
.tab:hover:not(.active){color:#333}
.view{display:none}
.view.active{display:block}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.ycol{background:#fff;border:1px solid #e8e4df;border-radius:12px;overflow:hidden}
.yhdr{background:#8C1515;color:#fff;padding:11px 12px;display:flex;justify-content:space-between;align-items:flex-start}
.yhdr .yt{font-size:14px;font-weight:700}
.yhdr .yu{font-size:11px;opacity:.7;font-weight:400;margin-top:2px}
.yhdr .yr{text-align:right;font-size:18px;font-weight:700}
.yhdr .yru{font-size:11px;opacity:.7;font-weight:400}
.qtr{padding:8px 10px;border-bottom:1px solid #f0ece6}
.qtr:last-of-type{border-bottom:none}
.ql{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#aaa;margin-bottom:6px;font-weight:700}
.slot{display:flex;align-items:flex-start;gap:6px;padding:4px;cursor:pointer;border-radius:5px}
.slot:hover{background:#f8f5f0}
.cb{width:14px;height:14px;border:1.5px solid #8C1515;border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center}
.cb.on{background:#8C1515}
.cb.on::after{content:'';display:block;width:8px;height:5px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.ci{flex:1;min-width:0}
.cc{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cn{font-size:10px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cu{font-size:10px;color:#bbb;flex-shrink:0}
.done .cc{text-decoration:line-through;opacity:.45}
.ctag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;margin-top:2px}
.t-req{background:#fce8e8;color:#8C1515}
.t-ge{background:#e8f0fc;color:#1a5fa8}
.t-elec{background:#eafce8;color:#2e7d1e}
.t-minor{background:#f5e8fc;color:#7b1fa2}
.t-dbl{background:#fff3e0;color:#bf6000}
.add-btn{width:100%;text-align:left;background:none;border:1px dashed #d8d3cc;border-radius:5px;padding:4px 8px;font-size:11px;color:#bbb;cursor:pointer;margin-top:5px}
.add-btn:hover{border-color:#8C1515;color:#8C1515;background:#fce8e8}

/* Reqs */
.rgroup{background:#fff;border:1px solid #e8e4df;border-radius:12px;margin-bottom:12px;overflow:hidden}
.rghdr{padding:12px 16px;border-bottom:1px solid #f0ece6;display:flex;align-items:center;gap:10px}
.rghdr h3{font-size:14px;font-weight:700;flex:1}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:600}
.b-major{background:#fce8e8;color:#8C1515}
.b-minor{background:#f5e8fc;color:#7b1fa2}
.b-ge{background:#e8f0fc;color:#1a5fa8}
.b-dbl{background:#fff3e0;color:#bf6000}
.rrow{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid #f5f2ef}
.rrow:last-child{border-bottom:none}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.d-done{background:#4caf50}
.d-part{background:#ff9800}
.d-todo{background:#ddd}
.rname{font-size:13px;flex:1}
.rbar{flex:1;padding:0 10px}
.rcnt{font-size:12px;color:#999;min-width:80px;text-align:right}
.rcnt.done{color:#2e7d1e;font-weight:700}
.legend{display:flex;flex-direction:column;gap:4px;margin-top:6px;font-size:12px;color:#666}
.legend span{display:flex;align-items:center;gap:6px}

/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:#fff;border-radius:14px;padding:22px;width:320px;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.mf input,.mf select{width:100%;padding:9px 11px;border:1px solid #ddd;border-radius:8px;font-size:13px;outline:none}
.mf input:focus,.mf select:focus{border-color:#8C1515}
.macts{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.btn-s{padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer}
.btn-p{padding:8px 18px;border-radius:8px;border:none;background:#8C1515;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-p:hover{background:#6e1010}

@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.app{flex-direction:column}.sidebar{width:100%;flex-direction:row;flex-wrap:wrap}.main{padding:16px}.grid{grid-template-columns:1fr}}
</style>
</head>

<div class="app">

    <div class="sidebar-logo">

    </div>

    <hr class="sb-divider"/>
    <div class="sb-section">Export</div>
    <button class="sb-btn" onclick="exportPDF()">📄 Download PDF</button>
    <button class="sb-btn" onclick="copyLink()">🔗 Copy share link</button>
    <div class="toast" id="toast">✓ Link copied!</div>
    <div class="sb-stats" id="sb-stats"></div>
  </nav>
  <div class="main" id="main"></div>
  <div id="modal-root"></div>
</div>

// \u2500\u2500 STATE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var S = {primary:null,double:null,minor:null,year:2025,checked:{},plan:null};

function buildPlan() {
  var p = MAJORS[S.primary];
  var d = S.double ? MAJORS[S.double] : null;
  var m = S.minor  ? MINORS[S.minor]  : null;
  var plan = JSON.parse(JSON.stringify(p.plan));
  if (d) {
    var existing = {};
    plan.forEach(function(q){q.courses.forEach(function(c){existing[c.code]=1;});});
    var toAdd = [];
    d.plan.forEach(function(q){q.courses.forEach(function(c){if(!existing[c.code]&&c.type==='req'){toAdd.push(Object.assign({},c,{type:'dbl'}));existing[c.code]=1;}});});
    toAdd.forEach(function(c,i){plan[Math.min(3+Math.floor(i/2),plan.length-1)].courses.push(c);});
  }
  if (m) {
    var existing2 = {};
    plan.forEach(function(q){q.courses.forEach(function(c){existing2[c.code]=1;});});
    m.courses.filter(function(c){return !existing2[c.code];}).forEach(function(c,i){plan[Math.min(2+Math.floor(i/2),plan.length-1)].courses.push(c);});
  }
  S.plan = {primary:p, secondary:d, minor:m, plan:plan};
}

function totalCourses(){return S.plan?S.plan.plan.reduce(function(a,q){return a+q.courses.length;},0):0;}
function doneCourses(){return Object.keys(S.checked).filter(function(k){return S.checked[k];}).length;}
function earnedUnits(){
  if(!S.plan)return 0;
  return S.plan.plan.reduce(function(t,q){
    return t+q.courses.reduce(function(s,c){
      return s+(S.checked[q.year+'_'+q.quarter+'_'+c.code]?c.units:0);
    },0);
  },0);
}
function checkedCodes(){
  var set={};
  if(!S.plan)return set;
  S.plan.plan.forEach(function(q){q.courses.forEach(function(c){if(S.checked[q.year+'_'+q.quarter+'_'+c.code])set[c.code]=1;});});
  return set;
}

// \u2500\u2500 URL SHARE \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function toURL(){
  var done=Object.keys(S.checked).filter(function(k){return S.checked[k];});
  var payload=JSON.stringify({p:S.primary,d:S.double||'',m:S.minor||'',y:S.year,c:done.join(',')});
  return location.origin+location.pathname+'?plan='+btoa(unescape(encodeURIComponent(payload)));
}
function fromURL(){
  var raw=new URLSearchParams(location.search).get('plan');
  if(!raw)return false;
  try{
    var o=JSON.parse(decodeURIComponent(escape(atob(raw))));
    S.primary=o.p||null; S.double=o.d||null; S.minor=o.m||null; S.year=o.y||2025; S.checked={};
    (o.c||'').split(',').filter(Boolean).forEach(function(k){S.checked[k]=true;});
    if(S.primary&&MAJORS[S.primary]){buildPlan();return true;}
  }catch(e){}
  return false;
}

    '<div class="card"><h3>Minor <span style="color:#bbb;font-weight:400;font-size:10px;text-transform:none">optional</span></h3>'+
    '<div class="pills" id="pm">'+
    Object.keys(MINORS).map(function(k){return '<div class="pill'+(S.minor===k?' sel':'')+'" data-k="'+k+'" onclick="pickMin(\''+k+'\',this)">'+MINORS[k].name+'</div>';}).join('')+
    '</div></div>'+
    '<div class="card"><h3>Start Year</h3><div class="pills">'+
    [2023,2024,2025,2026].map(function(y){return '<div class="pill'+(S.year===y?' sel':'')+'" onclick="pickYear('+y+',this)">'+y+'\u2013'+String(y+1).slice(-2)+'</div>';}).join('')+
    '</div></div>'+
    '<button class="build-btn" id="bbtn" onclick="go()" '+(S.primary?'':'disabled')+'>'+btnLabel()+'</button>'+
    '</div>';
}
function btnLabel(){return S.primary?('Build plan: '+MAJORS[S.primary].name+(S.double?' + '+MAJORS[S.double].name:'')+(S.minor?' + '+MINORS[S.minor].name:'')+' \u2192'):'Select a major to continue \u2192';}
function pickM1(k,el){S.primary=k;if(S.double===k)S.double=null;renderSetup();}
function pickM2(k,el){S.double=(S.double===k?null:k);renderSetup();}
function pickMin(k,el){S.minor=(S.minor===k?null:k);renderSetup();}
function pickYear(y,el){S.year=y;renderSetup();}
function go(){if(!S.primary)return;buildPlan();renderPlan();}
function resetPlan(){S.primary=null;S.double=null;S.minor=null;S.plan=null;S.checked={};history.replaceState(null,'',location.pathname);renderSetup();}

// \u2500\u2500 RENDER PLAN \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function renderPlan(){
  document.getElementById('sidebar').style.display='flex';
  var info='<b style="color:#fff;font-size:13px">'+S.plan.primary.name+'</b>';
  if(S.plan.secondary)info+='<br>+ '+S.plan.secondary.name;
  if(S.plan.minor)info+='<br><span style="opacity:.6;font-size:11px">minor: </span>'+S.plan.minor.name;
  document.getElementById('sb-plan-info').innerHTML=info;
  document.getElementById('main').innerHTML=
    '<div class="stats-row" id="srow"></div>'+
    '<div class="tabs">'+
    '<button class="tab active" onclick="switchTab(\'grid\',this)">\u1F4C5 4-Year Grid</button>'+
    '<button class="tab" onclick="switchTab(\'reqs\',this)">\u2705 Requirements</button>'+
    '</div>'+
    '<div class="view active" id="vgrid"></div>'+
    '<div class="view" id="vreqs"></div>';
  renderAll();
}
function renderAll(){renderStats();renderGrid();renderReqs();renderSbStats();}

function renderStats(){
  var total=totalCourses(),done=doneCourses(),units=earnedUnits(),pct=total?Math.round(done/total*100):0;
  var hasD=!!S.plan.secondary, hasM=!!S.plan.minor;
  document.getElementById('srow').innerHTML=
    '<div class="stat"><div class="sl">Courses done</div><div class="sv">'+done+'</div><div class="ss">of '+total+' planned</div></div>'+
    '<div class="stat"><div class="sl">Units earned</div><div class="sv">'+units+'</div><div class="ss">of '+S.plan.primary.totalUnits+' required</div></div>'+
    '<div class="stat"><div class="sl">Progress</div><div class="sv">'+pct+'%</div><div class="pbar"><div class="pfill" style="width:'+pct+'%"></div></div></div>'+
    '<div class="stat" style="max-width:150px"><div class="sl">Legend</div><div class="legend">'+
    '<span><span class="ctag t-req">Req</span> Major req</span>'+
    '<span><span class="ctag t-ge">GE</span> Ways GE</span>'+
    '<span><span class="ctag t-elec">Elec</span> Elective</span>'+
    (hasD?'<span><span class="ctag t-dbl">2nd</span> Double major</span>':'')+
    (hasM?'<span><span class="ctag t-minor">Min</span> Minor</span>':'')+
    '</div></div>';
}

function renderGrid(){
  var qtrs=['Autumn','Winter','Spring'],html='<div class="grid">';
  [1,2,3,4].forEach(function(y){
    var yu=S.plan.plan.filter(function(q){return q.year===y;}).reduce(function(s,q){return s+q.courses.reduce(function(a,c){return a+c.units;},0);},0);
    html+='<div class="ycol"><div class="yhdr"><div><div class="yt">Year '+y+'</div><div class="yu">'+(S.year+y-1)+'\u2013'+String(S.year+y).slice(-2)+'</div></div><div><div class="yr">'+yu+'</div><div class="yru">units</div></div></div>';
    qtrs.forEach(function(qt){
      var q=S.plan.plan.find(function(q){return q.year===y&&q.quarter===qt;});
      if(!q)return;
      var qu=q.courses.reduce(function(s,c){return s+c.units;},0);
      html+='<div class="qtr"><div class="ql">'+qt+' \u00B7 '+qu+'u</div>';
      q.courses.forEach(function(c){
        var key=y+'_'+qt+'_'+c.code,done=!!S.checked[key];
        var tc={req:'t-req',ge:'t-ge',elec:'t-elec',minor:'t-minor',dbl:'t-dbl'}[c.type]||'t-elec';
        var tl={req:'Req',ge:'GE',elec:'Elec',minor:'Min',dbl:'2nd'}[c.type]||'Elec';
        html+='<div class="slot'+(done?' done':'')+'" onclick="toggle(\''+key+'\')">'+
          '<div class="cb'+(done?' on':'')+'"></div>'+
          '<div class="ci"><div class="cc">'+c.code+'</div><div class="cn">'+c.name+'</div><span class="ctag '+tc+'">'+tl+'</span></div>'+
          '<div class="cu">'+c.units+'u</div></div>';
      });
      html+='<button class="add-btn" onclick="openAdd('+y+',\''+qt+'\')">+ add course</button></div>';
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('vgrid').innerHTML=html;
}

function renderReqs(){
  var codes=checkedCodes();
  function grp(reqs,label,bc,bl){
    var h='<div class="rgroup"><div class="rghdr"><h3>'+label+'</h3><span class="badge '+bc+'">'+bl+'</span></div>';
    reqs.forEach(function(r){
      var done=r.courses.length?Math.min(r.courses.filter(function(c){return codes[c];}).length,r.needed):0;
      var pct=r.needed?Math.round(done/r.needed*100):0,ok=done>=r.needed;
      var dc=ok?'d-done':done>0?'d-part':'d-todo',fc=ok?'#4caf50':done>0?'#ff9800':'#ddd';
      h+='<div class="rrow"><div class="dot '+dc+'"></div><div class="rname">'+r.name+'</div>'+
        '<div class="rbar"><div class="pbar"><div class="pfill" style="width:'+(ok?100:pct)+'%;background:'+fc+'"></div></div></div>'+
        '<div class="rcnt'+(ok?' done':'')+'">'+( ok?'\u2713 Done':r.courses.length?(done+'/'+r.needed):(r.needed+' needed'))+'</div></div>';
    });
    return h+'</div>';
  }
  var WAYS=['AQR','SI','CE','ER','AII','SMA','ED','GER'];
  var html=grp(S.plan.primary.requirements,S.plan.primary.name+' Requirements','b-major',S.plan.primary.degree+' Major');
  if(S.plan.secondary)html+=grp(S.plan.secondary.requirements,S.plan.secondary.name+' Requirements','b-dbl','2nd Major');
  if(S.plan.minor)html+=grp(S.plan.minor.requirements,S.plan.minor.name+' Requirements','b-minor','Minor');
  html+='<div class="rgroup"><div class="rghdr"><h3>Ways General Education</h3><span class="badge b-ge">Stanford GE</span></div>'+
    WAYS.map(function(w){var done=codes['WAYS: '+w]?1:0;return '<div class="rrow"><div class="dot '+(done?'d-done':'d-todo')+'"></div><div class="rname">Ways: '+w+'</div><div class="rbar"></div><div class="rcnt'+(done?' done':'')+'">'+( done?'\u2713 Done':'Needed')+'</div></div>';}).join('')+'</div>';
  document.getElementById('vreqs').innerHTML=html;
}

function renderSbStats(){
  var total=totalCourses(),done=doneCourses(),pct=total?Math.round(done/total*100):0;
  document.getElementById('sb-stats').innerHTML='<div class="sl">Overall progress</div><div class="sv">'+pct+'%</div><div class="ss">'+done+' of '+total+' courses done</div><div class="mini-bar"><div class="mini-fill" style="width:'+pct+'%"></div></div>';
}

function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('v'+tab).classList.add('active');
}
function toggle(key){S.checked[key]=!S.checked[key];renderAll();}

function openAdd(y,qt){
  document.getElementById('modal-root').innerHTML=
    '<div class="mbg" onclick="if(event.target===this)closeModal()">'+
    '<div class="modal"><h3>Add course \u2014 Year '+y+', '+qt+'</h3>'+
    '<div class="mf"><label>Course code</label><input id="nc" placeholder="e.g. CS 224N"/></div>'+
    '<div class="mf"><label>Course name</label><input id="nn" placeholder="e.g. NLP with Deep Learning"/></div>'+
    '<div class="mf"><label>Units</label><input id="nu" placeholder="4" style="max-width:80px"/></div>'+
    '<div class="mf"><label>Category</label><select id="nt"><option value="req">Major requirement</option><option value="ge">GE / Ways</option><option value="minor">Minor</option><option value="elec" selected>Elective</option></select></div>'+
    '<div class="macts"><button class="btn-s" onclick="closeModal()">Cancel</button><button class="btn-p" onclick="addC('+y+',\''+qt+'\')">Add</button></div></div></div>';
  document.getElementById('nc').focus();
}
function closeModal(){document.getElementById('modal-root').innerHTML='';}
function addC(y,qt){
  var code=document.getElementById('nc').value.trim();
  if(!code){alert('Enter a course code.');return;}
  var q=S.plan.plan.find(function(q){return q.year===y&&q.quarter===qt;});
  if(q)q.courses.push({code:code,name:document.getElementById('nn').value.trim()||code,units:parseInt(document.getElementById('nu').value)||4,type:document.getElementById('nt').value});
  closeModal();renderAll();
}

// \u2500\u2500 COPY LINK \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function copyLink(){
  var url=toURL();
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(url).then(function(){showToast();}).catch(function(){prompt('Copy this link:',url);});
  } else {
    prompt('Copy this link:',url);
  }
}
function showToast(){var t=document.getElementById('toast');t.style.display='block';setTimeout(function(){t.style.display='none';},2500);}

// \u2500\u2500 PDF (inline, no external lib needed) \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function exportPDF(){
  if(!S.plan){alert('Build your plan first!');return;}
  // Build a printable HTML page and open it
  var qtrs=['Autumn','Winter','Spring'];
  var rows='';
  S.plan.plan.forEach(function(q){
    q.courses.forEach(function(c){
      var key=q.year+'_'+q.quarter+'_'+c.code;
      var done=S.checked[key]?'\u2713':'';
      var type={req:'Major Req',ge:'Ways GE',elec:'Elective',minor:'Minor',dbl:'2nd Major'}[c.type]||c.type;
      rows+='<tr style="background:'+(S.checked[key]?'#f0f8f0':'#fff')+';"><td>'+q.year+'</td><td>'+q.quarter+'</td><td>'+c.code+'</td><td>'+c.name+'</td><td>'+c.units+'</td><td>'+type+'</td><td style="text-align:center;color:#8C1515;font-weight:bold">'+done+'</td></tr>';
    });
  });
  var total=totalCourses(),done=doneCourses(),units=earnedUnits(),pct=total?Math.round(done/total*100):0;
  var title=S.plan.primary.name+(S.plan.secondary?' + '+S.plan.secondary.name:'');
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><title>'+title+' \u2014 4-Year Plan</title><style>'+
    'body{font-family:Arial,sans-serif;padding:32px;color:#1a1a1a}'+
    'h1{color:#8C1515;margin-bottom:4px}'+
    '.meta{color:#666;font-size:13px;margin-bottom:24px}'+
    '.stats{display:flex;gap:24px;margin-bottom:28px;background:#faf9f7;padding:14px 18px;border-radius:8px}'+
    '.stat .l{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.05em}'+
    '.stat .v{font-size:22px;font-weight:700;color:#8C1515}'+
    'table{width:100%;border-collapse:collapse;font-size:13px}'+
    'th{background:#8C1515;color:#fff;padding:9px 12px;text-align:left;font-size:12px;letter-spacing:.04em}'+
    'td{padding:7px 12px;border-bottom:1px solid #f0ece6}'+
    'tr:hover{background:#faf9f7!important}'+
    '@media print{button{display:none}}'+
    '</style></head><body>'+
    '<h1>Stanford 4-Year Plan</h1>'+
    '<div class="meta">'+title+(S.plan.minor?' \u00B7 '+S.plan.minor.name+' minor':'')+'</div>'+
    '<div class="stats">'+
    '<div class="stat"><div class="l">Courses done</div><div class="v">'+done+' / '+total+'</div></div>'+
    '<div class="stat"><div class="l">Units earned</div><div class="v">'+units+' / '+S.plan.primary.totalUnits+'</div></div>'+
    '<div class="stat"><div class="l">Progress</div><div class="v">'+pct+'%</div></div>'+
    '</div>'+
    '<button onclick="window.print()" style="margin-bottom:20px;padding:9px 20px;background:#8C1515;color:#fff;border:none;border-radius:7px;font-size:14px;cursor:pointer">\u1F5A8 Print / Save as PDF</button>'+
    '<table><thead><tr><th>Year</th><th>Quarter</th><th>Code</th><th>Course Name</th><th>Units</th><th>Type</th><th>Done</th></tr></thead><tbody>'+rows+'</tbody></table>'+
    '</body></html>');
  w.document.close();
}

// \u2500\u2500 INIT \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
if(!fromURL()){renderSetup();}else{renderPlan();}
</script>
